name: Frontend Quality

on:
  push:
    paths:
      - "ims_frontend/**"
      - ".github/workflows/frontend-quality.yml"
  pull_request:
    paths:
      - "ims_frontend/**"
      - ".github/workflows/frontend-quality.yml"

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ims_frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ims_frontend/package-lock.json

      - name: Install dependencies
        run: |
              cd ./ims_frontend
              npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check
